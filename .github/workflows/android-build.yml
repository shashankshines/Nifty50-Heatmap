name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install Node Dependencies
        run: npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest

      - name: Verify web assets
        run: |
          echo "=== public/ directory ==="
          ls -la public/
          echo "=== capacitor.config.json ==="
          cat capacitor.config.json

      - name: Initialize Capacitor Android Platform
        run: npx cap add android 2>&1 || echo "Platform may already exist"

      - name: Copy and Sync Web Assets
        run: |
          npx cap copy android 2>&1
          npx cap sync android 2>&1

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nifty-heatmap-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
