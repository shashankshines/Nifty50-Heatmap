name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install Node Dependencies
        run: npm install @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest

      - name: Verify web assets
        run: |
          echo "=== Checking public directory ==="
          ls -la public/
          echo "=== Checking capacitor.config.json ==="
          cat capacitor.config.json
          echo "=== Checking package.json ==="
          cat package.json

      - name: Initialize Capacitor Android Platform
        run: |
          echo "=== Adding Android platform ==="
          npx cap add android 2>&1 || echo "Platform may already exist"
          echo "=== Listing android directory ==="
          ls -la android/ || echo "Android directory not found!"

      - name: Copy Web Assets to Android
        run: |
          echo "=== Copying web assets ==="
          npx cap copy android 2>&1
          echo "=== Syncing plugins ==="
          npx cap sync android 2>&1

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace 2>&1

      - name: Verify APK Output
        run: |
          echo "=== Looking for APK files ==="
          find android -name "*.apk" -type f 2>/dev/null
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "APK directory not found"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nifty-heatmap-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
