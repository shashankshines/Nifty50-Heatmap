<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nifty 50 Heatmap - Liquid Glass</title>
    <!-- Google Fonts: Inter for a clean, modern aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background elements for the liquid glass effect -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>

    <div class="container">
        <header class="glass-header">
            <div class="header-left">
                <h1>NIFTY 50</h1>
                <span class="subtitle">Index Tracker Heatmap</span>
            </div>
            <div class="header-right">
                <div class="index-value">
                    <span class="ltp" id="nifty-ltp">--</span>
                    <span class="change positive" id="nifty-change">--</span>
                </div>
            </div>
        </header>

        <!-- Level Alerts Panel -->
        <section id="alerts-panel" class="alerts-panel glass-panel">
            <div class="alerts-header">
                <div class="alerts-title">
                    <span class="alerts-icon">🔔</span>
                    <h2>Level Break Alerts</h2>
                </div>
                <div class="alerts-controls">
                    <button id="add-level-btn" class="alert-btn add-btn">+ Add Level</button>
                    <button id="toggle-sound-btn" class="alert-btn sound-btn active" title="Toggle sound">🔊</button>
                </div>
            </div>
            <div id="levels-grid" class="levels-grid">
                <!-- Level cards dynamically injected -->
            </div>
            <!-- Add Level Modal -->
            <div id="add-level-modal" class="add-level-modal">
                <div class="add-level-form glass-panel">
                    <h3>Add Alert Level</h3>
                    <div class="form-row">
                        <label>Level Price</label>
                        <input type="number" id="level-price-input" placeholder="e.g. 23000" step="50" />
                    </div>
                    <div class="form-row">
                        <label>Type</label>
                        <select id="level-type-input">
                            <option value="resistance">Resistance (Above)</option>
                            <option value="support">Support (Below)</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>Label (optional)</label>
                        <input type="text" id="level-label-input" placeholder="e.g. Key Resistance" />
                    </div>
                    <div class="form-actions">
                        <button id="cancel-level-btn" class="alert-btn cancel-btn">Cancel</button>
                        <button id="save-level-btn" class="alert-btn save-btn">Save</button>
                    </div>
                </div>
            </div>
        </section>

        <main class="content-wrapper glass-panel">
            <div class="heatmap-header">
                <h2>Market Performance</h2>
                <div class="legend">
                    <span class="legend-item bg-gain-high">High Gains</span>
                    <span class="legend-item bg-gain-mid">Mid Gains</span>
                    <span class="legend-item bg-neutral">Neutral</span>
                    <span class="legend-item bg-loss-mid">Mid Losses</span>
                    <span class="legend-item bg-loss-high">High Losses</span>
                </div>
            </div>
            
            <div id="heatmap-grid" class="heatmap-grid">
                <!-- Tiles will be dynamically injected here by script.js -->
            </div>
        </main>
    </div>
    <!-- Chart Modal Overlay -->
    <div id="chart-modal" class="chart-modal-overlay">
        <div class="chart-modal glass-panel">
            <div class="chart-modal-header">
                <div class="chart-modal-title">
                    <span id="chart-symbol-name" class="chart-symbol">--</span>
                    <span id="chart-stock-info" class="chart-info">--</span>
                </div>
                <button id="chart-close-btn" class="chart-close-btn">&times;</button>
            </div>
            <div id="chart-container" class="chart-container">
                <!-- TradingView widget will be injected here -->
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="script.js?v=4"></script>
</body>
</html>
